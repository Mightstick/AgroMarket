<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Showcase Inspector - AgroMarket</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="responsive.css">
    <link rel="stylesheet" href="animations.css">
</head>
<body>

    <header>
        <div class="container navbar">
            <a href="index.html" class="logo">Agro<span>Market</span></a>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="products.html" class="nav-link">Shop Catalog</a></li>
                <li><a href="about.html" class="nav-link">Our Mission</a></li>
                <li><a href="faq.html" class="nav-link">FAQs</a></li>
                <li><a href="contact.html" class="nav-link">Contact</a></li>
            </ul>
            <div class="nav-actions">
                <span class="theme-toggle" title="Toggle Display State">🌓</span>
                <a href="login.html" class="btn btn-outline" style="padding:8px 16px; font-size:0.9rem;">Sign In</a>
                <div class="cart-icon-wrapper" onclick="window.location.href='cart.html'">
                    🛒<span class="cart-badge">0</span>
                </div>
            </div>
        </div>
    </header>

    <main class="container animate-fade" style="margin-top:50px;">
        <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(300px, 1fr)); gap:40px; background:var(--bg-white); padding:30px; border-radius:12px; border:1px solid var(--border-color)">
            <div>
                <img id="detail-img" src="" style="width:100%; height:400px; object-fit:cover; border-radius:12px;">
            </div>
            <div>
                <span id="detail-cat" style="color:var(--primary-green); text-transform:uppercase; font-weight:700;"></span>
                <h1 id="detail-title" style="margin:10px 0 20px 0;"></h1>
                <h2 id="detail-price" style="color:var(--primary-green); margin-bottom:20px;"></h2>
                <p id="detail-desc" style="color:var(--text-muted); margin-bottom:30px;"></p>
                
                <div style="display:flex; gap:15px; align-items:center; margin-bottom:30px;">
                    <label>Quantity Metric:</label>
                    <input type="number" id="detail-qty" value="1" min="1" style="width:70px; padding:8px; border-radius:6px; border:1px solid var(--border-color); background:var(--bg-light); color:var(--text-dark);">
                </div>

                <div style="display:flex; gap:15px; flex-wrap:wrap;">
                    <button id="detail-add-btn" class="btn btn-primary">Add Product To Order Matrix</button>
                    <button class="btn btn-secondary" onclick="window.location.href='checkout.html'">Instant Procurement</button>
                </div>
            </div>
        </div>
    </main>

    <script src="products.js"></script>
    <script src="cart.js"></script>
    <script src="main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const id = parseInt(params.get('id')) || 1;
            const targetProd = mockProducts.find(p => p.id === id);
            
            if(targetProd) {
                document.getElementById('detail-img').src = targetProd.image;
                document.getElementById('detail-cat').textContent = targetProd.category;
                document.getElementById('detail-title').textContent = targetProd.name;
                document.getElementById('detail-price').textContent = `₦${targetProd.price.toLocaleString()}`;
                document.getElementById('detail-desc').textContent = targetProd.description || "Premium organically raised produce, structured through precise harvest methodology to maximize shelf span and nutrient composition.";
                
                document.getElementById('detail-add-btn').onclick = () => {
                    const qty = parseInt(document.getElementById('detail-qty').value) || 1;
                    CartEngine.addItem(targetProd.id, qty);
                };
            }
        });
    </script>
</body>
</html>
