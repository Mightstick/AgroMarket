<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Interface Comms Link - AgroMarket</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="responsive.css">
</head>
<body>

    <header>
        <div class="container navbar">
            <a href="index.html" class="logo">Agro<span>Market</span></a>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="products.html" class="nav-link">Shop Catalog</a></li>
                <li><a href="about.html" class="nav-link">Our Mission</a></li>
                <li><a href="faq.html" class="nav-link">FAQs</a></li>
                <li><a href="contact.html" class="nav-link">Contact</a></li>
            </ul>
            <div class="nav-actions">
                <span class="theme-toggle">🌓</span>
                <div class="cart-icon-wrapper" onclick="window.location.href='cart.html'">🛒<span class="cart-badge">0</span></div>
            </div>
        </div>
    </header>

    <main class="container" style="margin-top:50px; max-width:600px;">
        <div style="background:var(--bg-white); padding:35px; border-radius:12px; border:1px solid var(--border-color)">
            <h2 style="margin-bottom:20px;">Dispatch Telemetry Packet</h2>
            <form onsubmit="event.preventDefault(); window.Toast.show('Message successfully injected into technical queue support logs!'); this.reset();">
                <div style="margin-bottom:15px;">
                    <label style="display:block; margin-bottom:5px;">Metadata Context Identity</label>
                    <input type="text" required style="width:100%; padding:10px; border-radius:6px; border:1px solid var(--border-color); background:var(--bg-light); color:var(--text-dark);">
                </div>
                <div style="margin-bottom:15px;">
                    <label style="display:block; margin-bottom:5px;">Data Stream Description Payload</label>
                    <textarea required rows="5" style="width:100%; padding:10px; border-radius:6px; border:1px solid var(--border-color); background:var(--bg-light); color:var(--text-dark); font-family:inherit;"></textarea>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%">Transmit Form Packet</button>
            </form>
        </div>
    </main>

    <script src="main.js"></script>
</body>
</html>
