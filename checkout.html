<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settle Order Process - AgroMarket</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="responsive.css">
</head>
<body>

    <header>
        <div class="container navbar">
            <a href="index.html" class="logo">Agro<span>Market</span></a>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="products.html" class="nav-link">Shop Catalog</a></li>
                <li><a href="about.html" class="nav-link">Our Mission</a></li>
                <li><a href="faq.html" class="nav-link">FAQs</a></li>
                <li><a href="contact.html" class="nav-link">Contact</a></li>
            </ul>
            <div class="nav-actions">
                <span class="theme-toggle" title="Toggle Display State">🌓</span>
                <a href="login.html" class="btn btn-outline" style="padding:8px 16px; font-size:0.9rem;">Sign In</a>
                <div class="cart-icon-wrapper" onclick="window.location.href='cart.html'">
                    🛒<span class="cart-badge">0</span>
                </div>
            </div>
        </div>
    </header>

    <main class="container" style="margin-top:40px; max-width:800px;">
        <div style="background:var(--bg-white); padding:40px; border-radius:12px; border:1px solid var(--border-color); box-shadow:var(--shadow-md);">
            <h2 style="margin-bottom:25px; border-bottom:1px solid var(--border-color); padding-bottom:10px;">Billing & Logistical Specifications</h2>
            <form id="checkout-form" onsubmit="event.preventDefault(); window.Toast.show('Order successfully written into standard supply logistics pipelines!'); localStorage.removeItem('agro_cart'); setTimeout(()=>window.location.href='buyer-dashboard.html', 1500);">
                <div style="margin-bottom:15px;">
                    <label style="display:block; margin-bottom:5px; font-weight:500;">Consignee Full Legal Name</label>
                    <input type="text" required style="width:100%; padding:10px; border-radius:6px; border:1px solid var(--border-color); background:var(--bg-light); color:var(--text-dark);">
                </div>
                <div style="margin-bottom:15px;">
                    <label style="display:block; margin-bottom:5px; font-weight:500;">Physical Address Drop Point</label>
                    <input type="text" required style="width:100%; padding:10px; border-radius:6px; border:1px solid var(--border-color); background:var(--bg-light); color:var(--text-dark);">
                </div>
                <div style="grid-template-columns:1fr 1fr; display:grid; gap:15px; margin-bottom:25px;">
                    <div>
                        <label style="display:block; margin-bottom:5px; font-weight:500;">Region / State State</label>
                        <input type="text" required style="width:100%; padding:10px; border-radius:6px; border:1px solid var(--border-color); background:var(--bg-light); color:var(--text-dark);">
                    </div>
                    <div>
                        <label style="display:block; margin-bottom:5px; font-weight:500;">Direct Telecom Identifier</label>
                        <input type="tel" required style="width:100%; padding:10px; border-radius:6px; border:1px solid var(--border-color); background:var(--bg-light); color:var(--text-dark);">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%">Authorize Settlement Pipeline</button>
            </form>
        </div>
    </main>

    <script src="products.js"></script>
    <script src="cart.js"></script>
    <script src="main.js"></script>
</body>
</html>
